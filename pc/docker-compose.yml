# PC 側サービスを Docker で常駐させる構成。
#
#   cp .env.example .env      # SERIAL_PORT を実機に合わせる（任意）
#   docker compose up -d --build
#   docker compose logs -f    # ボタンイベントを確認
#
# ATOM Lite の USB シリアルをコンテナに渡す（Linux / WSL2 前提。詳細は README）。
services:
  button:
    build: .
    # ホストのシリアルデバイスをコンテナ内の同じパスに渡す。
    devices:
      - "${SERIAL_PORT:-/dev/ttyUSB0}:${SERIAL_PORT:-/dev/ttyUSB0}"
    environment:
      SERIAL_PORT: "${SERIAL_PORT:-/dev/ttyUSB0}"
      SERIAL_BAUD: "${SERIAL_BAUD:-115200}"
      NORMAL_COLOR: "${NORMAL_COLOR:-00FF00}"   # 正常時=緑
      PRESSED_COLOR: "${PRESSED_COLOR:-FF0000}" # 押下時=赤
    # USB を抜き差ししても再接続してほしいので常に再起動。
    restart: unless-stopped
